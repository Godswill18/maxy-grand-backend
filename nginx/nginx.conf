# ═══════════════════════════════════════════════════════════════════════════════
#  Nginx Configuration — Maxy Grand Hotel
#  Edge-layer rate limiting + reverse proxy to Node.js backend (port 5000)
#
#  Architecture:  Client → Nginx (edge) → Node.js App → Redis → MongoDB
#
#  Rate-limit zones are defined in the http block and applied per location.
#  These limits are the FIRST line of defense — the app layer enforces
#  stricter, role-aware limits on top using Redis sliding windows.
# ═══════════════════════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;                 # One worker per CPU core
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;                          # Efficient I/O on Linux
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'rl_limit=$limit_req_status';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;                # Hide Nginx version in headers

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # ── Rate-Limit Zones ($binary_remote_addr = compact 4-byte IP key) ───────
    #
    #   Zone name          Key             Size    Rate
    #   ─────────────────────────────────────────────────────────────────────
    #   login_zone         IP              10 MB   5  req/min  (~0.08/s)
    #   forgot_zone        IP              10 MB   3  req/min  (~0.05/s)
    #   availability_zone  IP              10 MB   60 req/min  (1/s)
    #   booking_zone       IP              10 MB   10 req/min  (~0.17/s)
    #   payment_zone       IP              10 MB   5  req/min  (~0.08/s)
    #   admin_zone         IP              10 MB   300 req/min (5/s)
    #   api_zone           IP              20 MB   100 req/min (~1.67/s)
    #
    #   10 MB ≈ 160,000 IP addresses tracked simultaneously.

    limit_req_zone $binary_remote_addr zone=login_zone:10m        rate=5r/m;
    limit_req_zone $binary_remote_addr zone=forgot_zone:10m       rate=3r/m;
    limit_req_zone $binary_remote_addr zone=availability_zone:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=booking_zone:10m      rate=10r/m;
    limit_req_zone $binary_remote_addr zone=payment_zone:10m      rate=5r/m;
    limit_req_zone $binary_remote_addr zone=admin_zone:10m        rate=300r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:20m          rate=100r/m;

    # Return JSON on rate-limit rejection (matches app-layer error format)
    limit_req_status 429;
    limit_req_log_level warn;

    # ── Upstream — Node.js backend ────────────────────────────────────────────
    upstream nodejs_backend {
        server 127.0.0.1:5000;

        # For horizontal scaling — add more instances here:
        # server 127.0.0.1:5001;
        # server 127.0.0.1:5002;

        keepalive 32;                   # Persistent connections to backend
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name maxygrandhotel.com www.maxygrandhotel.com
                    staff.maxygrandhotel.com;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    #  Guest Frontend — maxygrandhotel.com
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name maxygrandhotel.com www.maxygrandhotel.com;

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/maxygrandhotel.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/maxygrandhotel.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security Headers ──────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"    always;
        add_header X-Content-Type-Options    "nosniff"       always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Proxy settings (shared across locations) ──────────────────────────
        proxy_http_version 1.1;
        proxy_set_header Upgrade       $http_upgrade;
        proxy_set_header Connection    "upgrade";
        proxy_set_header Host          $host;
        proxy_set_header X-Real-IP     $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # ── POST /api/users/login-user — brute-force protection ──────────────
        location = /api/users/login-user {
            limit_req zone=login_zone burst=3 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── POST /api/users/login-guest ───────────────────────────────────────
        location = /api/users/login-guest {
            limit_req zone=login_zone burst=3 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── POST /api/users/request-password-reset ────────────────────────────
        location = /api/users/request-password-reset {
            limit_req zone=forgot_zone burst=2 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── Room availability / pricing scrape prevention ─────────────────────
        location ~* ^/api/rooms/(get-all-rooms|available|available_rooms)$ {
            limit_req zone=availability_zone burst=20 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── Booking endpoints ─────────────────────────────────────────────────
        location ~* ^/api/bookings/(create-with-payment|create-walkin|check-availability)$ {
            limit_req zone=booking_zone burst=5 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── Payment endpoints — strictest limit ───────────────────────────────
        location ~* ^/api/payments/(verify|create)$ {
            limit_req zone=payment_zone burst=2 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── Paystack Webhook — bypass rate limiting (trusted source) ──────────
        location = /api/payments/webhook {
            # Validate Paystack IP ranges in production
            # allow 52.31.139.75;
            # allow 52.49.173.169;
            # allow 52.214.14.220;
            # deny all;
            proxy_pass http://nodejs_backend;
        }

        # ── Socket.IO (real-time notifications) ───────────────────────────────
        location /socket.io/ {
            proxy_pass         http://nodejs_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ── All other API routes — general limiter ────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=30 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── Static uploaded files (images) ────────────────────────────────────
        location /uploads/ {
            alias /var/www/maxy-grand/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Root (serve React guest frontend) ─────────────────────────────────
        location / {
            root   /var/www/maxy-grand/guest;
            try_files $uri $uri/ /index.html;
            expires 1h;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    #  Staff / Admin Dashboard — staff.maxygrandhotel.com
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name staff.maxygrandhotel.com;

        ssl_certificate     /etc/letsencrypt/live/staff.maxygrandhotel.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/staff.maxygrandhotel.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── Staff login ───────────────────────────────────────────────────────
        location = /api/users/login-user {
            limit_req zone=login_zone burst=5 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── Admin/staff dashboard endpoints — higher limits ───────────────────
        location ~* ^/api/(analytics|dashboard|performance|reports)/ {
            limit_req zone=admin_zone burst=100 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── Socket.IO ─────────────────────────────────────────────────────────
        location /socket.io/ {
            proxy_pass         http://nodejs_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ── All other API routes ──────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass http://nodejs_backend;
        }

        # ── Serve React staff/admin frontend ──────────────────────────────────
        location / {
            root   /var/www/maxy-grand/staff;
            try_files $uri $uri/ /index.html;
        }
    }
}
